<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:"Courier New",monospace;}
canvas{display:block;}

#boot{position:fixed;inset:0;background:#0a0010;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 1.2s;}
#boot.hide{opacity:0;pointer-events:none;}
.boot-glitch{font-size:clamp(2.5rem,7vw,5.5rem);font-weight:700;color:#c084fc;letter-spacing:0.15em;text-align:center;animation:gb 3s infinite;text-shadow:0 0 40px #c084fc,0 0 80px #7c3aed;}
@keyframes gb{0%,100%{text-shadow:0 0 40px #c084fc,0 0 80px #7c3aed;}-2px,2px);}
.boot-sub{color:#4a4a6a;font-size:0.75rem;letter-spacing:0.4em;margin-top:0.75rem;}
.boot-warning{color:#f59e0b;font-size:0.7rem;letter-spacing:0.2em;margin-top:2rem;border:1px solid #f59e0b;padding:0.5rem 1.25rem;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.5rem;background:rgba(0,0,0,0.7);border-bottom:1px solid #1a0a2e;backdrop-filter:blur(8px);opacity:0;transition:opacity 0.5s;}
#hud.show{opacity:1;}
.hud-left{color:#c084fc;font-size:0.6rem;letter-spacing:0.25em;}
.hud-center{display:flex;align-items:center;gap:0.75rem;}
.ei-label{color:#c084fc;font-size:0.55rem;letter-spacing:0.2em;}
.ei-track{width:120px;height:6px;background:#1a0a2e;border-radius:99px;border:1px solid #3a1a5e;overflow:hidden;}
.ei-fill{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#c084fc);border-radius:99px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px #c084fc;}
.hud-right{color:#4a4a6a;font-size:0.55rem;letter-spacing:0.2em;}

#chapter-flash{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.4s;}
#chapter-flash.show{opacity:1;}
.cf-tag{color:#c084fc;font-size:0.65rem;letter-spacing:0.5em;margin-bottom:0.75rem;}
.cf-title{color:#fff;font-size:clamp(1.8rem,5vw,3.5rem);font-weight:700;letter-spacing:-0.02em;text-align:center;}
.cf-sub{color:#6b6b8a;font-size:0.7rem;letter-spacing:0.25em;margin-top:0.75rem;}

#dialogue{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);width:min(680px,92vw);background:rgba(5,0,18,0.97);border:2px solid #7c3aed;border-radius:10px;padding:1.5rem 1.75rem;z-index:150;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 0 50px rgba(124,58,237,0.25),inset 0 0 30px rgba(124,58,237,0.03);}
#dialogue.show{opacity:1;pointer-events:all;}
#dlg-speaker{color:#c084fc;font-size:0.6rem;letter-spacing:0.3em;margin-bottom:0.5rem;}
#dlg-text{color:#ddd;font-size:0.82rem;line-height:1.65;margin-bottom:1.1rem;min-height:36px;}
#dlg-choices{display:flex;flex-direction:column;gap:0.45rem;}
.choice{background:rgba(124,58,237,0.06);border:1px solid #2a1a4e;color:#999;font-family:"Courier New",monospace;font-size:0.72rem;text-align:left;padding:0.55rem 0.9rem;border-radius:5px;cursor:pointer;transition:all 0.18s;width:100%;}
.choice:hover{border-color:#c084fc;color:#fff;background:rgba(124,58,237,0.18);box-shadow:0 0 10px rgba(192,132,252,0.15);}
#dlg-next{background:transparent;border:1px solid #c084fc;color:#c084fc;font-family:"Courier New",monospace;font-size:0.65rem;letter-spacing:0.2em;padding:0.45rem 1.25rem;border-radius:4px;cursor:pointer;margin-top:0.5rem;display:none;animation:blink 1.5s infinite;}
#dlg-next:hover{background:#c084fc;color:#000;}

#feedback-toast{position:fixed;top:5rem;right:1rem;background:rgba(5,0,18,0.95);border:1px solid;border-radius:6px;padding:0.6rem 1rem;font-size:0.65rem;letter-spacing:0.1em;max-width:220px;line-height:1.5;z-index:300;transform:translateX(280px);transition:transform 0.4s,opacity 0.4s;opacity:0;}
#feedback-toast.show{transform:translateX(0);opacity:1;}
#feedback-toast.good{border-color:#06b6d4;color:#06b6d4;}
#feedback-toast.bad{border-color:#f43f5e;color:#f43f5e;}
#feedback-toast.info{border-color:#c084fc;color:#c084fc;}

#controls{position:fixed;bottom:1rem;right:1rem;background:rgba(0,0,0,0.6);border:1px solid #1a0a2e;color:#3a3a5a;font-size:0.52rem;letter-spacing:0.1em;padding:0.5rem 0.75rem;border-radius:4px;line-height:1.9;z-index:50;}

body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999;}
</style>

function setEI(pct) {
  eiLevel = Math.max(0, Math.min(100, pct));
  document.getElementById("ei-fill").style.width = eiLevel + "%";
  document.getElementById("ei-pct").textContent = Math.round(eiLevel) + "%";
}

function showToast(text, type="info") {
  const t = document.getElementById("feedback-toast");
  t.textContent = text;
  t.className = "show " + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 3200);
}

function flashChapter(tag, title, sub, cb) {
  const el = document.getElementById("chapter-flash");
  document.getElementById("cf-tag").textContent = tag;
  document.getElementById("cf-title").textContent = title;
  document.getElementById("cf-sub").textContent = sub;
  el.classList.add("show");
  setTimeout(() => { el.classList.remove("show"); if(cb) setTimeout(cb, 500); }, 3000);
}

function typeText(el, text, cb) {
  el.textContent = "";
  let i = 0;
  const iv = setInterval(() => {
    el.textContent += text[i++];
    if(i >= text.length) { clearInterval(iv); if(cb) cb(); }
  }, 16);
}

function showDialogue(step) {
  const s = eiScript[step];
  if(!s) { endEI(); return; }
  dialogueActive = true;
  const dlg = document.getElementById("dialogue");
  document.getElementById("dlg-speaker").textContent = s.speaker;
  document.getElementById("dlg-next").style.display = "none";
  document.getElementById("dlg-choices").innerHTML = "";
  dlg.classList.add("show");
  typeText(document.getElementById("dlg-text"), s.text, () => {
    if(s.choices) {
      s.choices.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = c.text;
        btn.onclick = () => pickChoice(c);
        document.getElementById("dlg-choices").appendChild(btn);
      });
    } else {
      document.getElementById("dlg-next").style.display = "block";
    }
  });
}

function pickChoice(c) {
  setEI(eiLevel + c.ei);
  document.getElementById("dlg-choices").innerHTML = "";
  const fb = document.createElement("div");
  fb.style.cssText = `color:${c.good?"#06b6d4":"#f43f5e"};font-size:0.75rem;margin-bottom:0.5rem;line-height:1.5;`;
  fb.textContent = c.fb;
  document.getElementById("dlg-choices").appendChild(fb);
  showToast(c.fb, c.good ? "good" : "bad");
  document.getElementById("dlg-next").style.display = "block";

  // clear a distraction when a good answer is given
  if(c.good) clearNextDistraction();
}

document.getElementById("dlg-next").onclick = () => {
  dlgStep++;
  document.getElementById("dlg-choices").innerHTML = "";
  showDialogue(dlgStep);
};

function clearNextDistraction() {
  const alive = distractions.filter(d => d.alive);
  if(alive.length > 0) {
    const d = alive[Math.floor(Math.random() * alive.length)];
    d.alive = false;
    distractionsCleared++;
  }
}

function startEI() {
  if(dialogueActive) return;
  gamePhase = "npc";
  dlgStep = 0;
  flashChapter("CHAPTER 01", "EMOTIONAL INTELLIGENCE", "the temple is open. three people need you.", () => {
    showDialogue(0);
  });
}

function endEI() {
  document.getElementById("dialogue").classList.remove("show");
  dialogueActive = false;
  gamePhase = "complete";
  // Clear all remaining distractions
  distractions.forEach(d => d.alive = false);
  setEI(Math.max(eiLevel, 85));
  diya.active = false;
  showToast("✓ EI COMPLETE — Mind: ordered. Chaos: dissolved.", "good");
  flashChapter("MIND CLEARED", "YOU UNDERSTAND NOW", "close the laptop. the next chapter awaits.");
}

// ── DIYA CHASE LOGIC ──
function updateDiya(dt) {
  if(!diya.active) return;
  const dx = player.x - diya.x;
  const dy = player.y - diya.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist > 20) {
    diya.x += (dx/dist) * diya.speed;
    diya.y += (dy/dist) * diya.speed;
    diya.flipX = dx < 0;
  }
}

// ── DRAW ──
function drawWorld() {
  const W = canvas.width, H = canvas.height;
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  // ── BG: chaotic brain ──
  // Base — dark purple-black
  const chaosAmt = 1 - (distractionsCleared / totalDistractions);
  const bgR = Math.floor(5 + chaosAmt * 10);
  const bgG = Math.floor(0 + chaosAmt * 2);
  const bgB = Math.floor(15 + chaosAmt * 25);
  ctx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);

  // Grid lines (get cleaner as EI improves)
  ctx.strokeStyle = `rgba(124,58,237,${0.04 + (1-chaosAmt)*0.08})`;
  ctx.lineWidth = 1;
  for(let x=0;x<WORLD_W;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WORLD_H);ctx.stroke();}
  for(let y=0;y<WORLD_H;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD_W,y);ctx.stroke();}

  // ── Brain particles ──
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x < 0) p.x = WORLD_W;
    if(p.x > WORLD_W) p.x = 0;
    if(p.y < 0) p.y = WORLD_H;
    if(p.y > WORLD_H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha * (0.3 + chaosAmt * 0.7);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // ── Thought clouds ──
  thoughts.forEach(t => {
    t.x += t.vx; t.y += t.vy;
    if(t.x < 0) t.x = WORLD_W;
    if(t.x > WORLD_W) t.x = 0;
    if(t.y < 0) t.y = WORLD_H;
    if(t.y > WORLD_H) t.y = 0;
    ctx.font = "italic 13px Courier New";
    ctx.fillStyle = t.color;
    ctx.globalAlpha = 0.3 + chaosAmt * 0.4;
    ctx.fillText(t.text, t.x, t.y);
    ctx.globalAlpha = 1;
  });

  // ── Distractions ──
  distractions.forEach(d => {
    if(!d.alive) return;
    d.x += d.vx; d.y += d.vy;
    if(d.x < 50 || d.x > WORLD_W-300) d.vx *= -1;
    if(d.y < 50 || d.y > WORLD_H-100) d.vy *= -1;

    ctx.globalAlpha = d.opacity;
    // Bubble background
    ctx.fillStyle = "rgba(5,0,18,0.85)";
    const pad = 10;
    roundRect(ctx, d.x - pad, d.y - 24, d.w + pad*2, d.h, 6);
    ctx.fill();
    // Border
    ctx.strokeStyle = d.color;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = d.opacity * 0.7;
    roundRect(ctx, d.x - pad, d.y - 24, d.w + pad*2, d.h, 6);
    ctx.stroke();
    // Text
    ctx.globalAlpha = d.opacity;
    ctx.font = "bold 13px Courier New";
    ctx.fillStyle = d.color;
    ctx.fillText(d.text, d.x, d.y);
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  });

  // ── NPC zones ──
  npcs.forEach(npc => {
    if(npc.solved) return;
    const pulse = Math.sin(Date.now()/600) * 0.3 + 0.7;
    // Glow radius
    const grad = ctx.createRadialGradient(npc.x+45, npc.y+55, 10, npc.x+45, npc.y+55, 80);
    grad.addColorStop(0, npc.color + "33");
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.fillRect(npc.x-40, npc.y-40, 170, 190);
    // Emoji sprite placeholder (big emoji)
    ctx.font = "48px serif";
    ctx.textAlign = "center";
    ctx.globalAlpha = pulse;
    ctx.fillText(npc.emoji, npc.x + 45, npc.y + 60);
    ctx.globalAlpha = 1;
    // Name
    ctx.font = "bold 11px Courier New";
    ctx.fillStyle = npc.color;
    ctx.textAlign = "center";
    ctx.fillText(npc.name, npc.x + 45, npc.y + 90);
    // Approach prompt
    ctx.font = "9px Courier New";
    ctx.fillStyle = npc.color;
    ctx.globalAlpha = pulse * 0.8;
    ctx.fillText("[ walk close ]", npc.x + 45, npc.y + 106);
    ctx.globalAlpha = 1;
    ctx.textAlign = "left";
  });

  // ── Temple ──
  temple.glowPhase += 0.02;
  const tGlow = Math.sin(temple.glowPhase) * 0.3 + 0.7;
  const tClarity = 1 - chaosAmt;

  // Temple outer glow
  const tGrad = ctx.createRadialGradient(temple.x+120, temple.y+90, 20, temple.x+120, temple.y+90, 180);
  tGrad.addColorStop(0, `rgba(192,132,252,${0.15 + tClarity*0.2})`);
  tGrad.addColorStop(1, "transparent");
  ctx.fillStyle = tGrad;
  ctx.fillRect(temple.x-80, temple.y-80, 400, 360);

  // Temple body
  ctx.fillStyle = `rgba(15,5,35,${0.9 + tClarity*0.1})`;
  roundRect(ctx, temple.x, temple.y, temple.w, temple.h, 8);
  ctx.fill();
  // Top bar
  ctx.fillStyle = `rgba(124,58,237,${0.8 + tClarity*0.2})`;
  ctx.fillRect(temple.x, temple.y, temple.w, 8);
  // Border
  ctx.strokeStyle = `rgba(192,132,252,${tGlow * (0.6 + tClarity*0.4)})`;
  ctx.lineWidth = 2;
  roundRect(ctx, temple.x, temple.y, temple.w, temple.h, 8);
  ctx.stroke();
  // Pillars
  [30,80,130,180].forEach(px => {
    ctx.fillStyle = `rgba(124,58,237,${0.25 + tClarity*0.2})`;
    ctx.fillRect(temple.x+px, temple.y+8, 10, temple.h-8);
  });
  // Door
  ctx.fillStyle = "#050012";
  ctx.fillRect(temple.x+95, temple.y+temple.h-60, 50, 60);
  ctx.strokeStyle = `rgba(192,132,252,${0.5})`;
  ctx.lineWidth = 1;
  ctx.strokeRect(temple.x+95, temple.y+temple.h-60, 50, 60);
  // Orb
  const orbGrad = ctx.createRadialGradient(temple.x+120, temple.y+80, 0, temple.x+120, temple.y+80, 20);
  orbGrad.addColorStop(0, "#fff");
  orbGrad.addColorStop(0.4, "#c084fc");
  orbGrad.addColorStop(1, "transparent");
  ctx.fillStyle = orbGrad;
  ctx.globalAlpha = tGlow;
  ctx.beginPath(); ctx.arc(temple.x+120, temple.y+80, 20, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // Label
  ctx.font = "bold 12px Courier New";
  ctx.fillStyle = "#c084fc";
  ctx.textAlign = "center";
  ctx.fillText("MIND TEMPLE", temple.x+120, temple.y+temple.h+22);
  ctx.font = "9px Courier New";
  ctx.fillStyle = "#6b6b8a";
  ctx.fillText("EI MODULE", temple.x+120, temple.y+temple.h+36);
  ctx.textAlign = "left";
  ctx.lineWidth = 1;

  // Solved NPC checkmarks
  npcs.forEach(npc => {
    if(!npc.solved) return;
    ctx.font = "28px serif";
    ctx.textAlign = "center";
    ctx.globalAlpha = 0.5;
    ctx.fillText("✓", npc.x+45, npc.y+55);
    ctx.globalAlpha = 1;
    ctx.textAlign = "left";
  });

  // ── DIYA CHASER ──
  if(diya.active) {
    // Draw diya sprite
    ctx.save();
    if(diya.flipX) {
      ctx.translate(diya.x + diya.w, diya.y);
      ctx.scale(-1, 1);
      ctx.drawImage(imgs.diya_side, 0, 0, diya.w, diya.h);
    } else {
      ctx.drawImage(imgs.diya_side, diya.x, diya.y, diya.w, diya.h);
    }
    ctx.restore();
    // Sign above diya
    ctx.fillStyle = "rgba(5,0,18,0.9)";
    roundRect(ctx, diya.x - 40, diya.y - 36, 175, 26, 4);
    ctx.fill();
    ctx.strokeStyle = "#f43f5e";
    ctx.lineWidth = 1.5;
    roundRect(ctx, diya.x - 40, diya.y - 36, 175, 26, 4);
    ctx.stroke();
    ctx.font = "bold 11px Courier New";
    ctx.fillStyle = "#f43f5e";
    ctx.textAlign = "center";
    ctx.fillText(diya.signText, diya.x + 47, diya.y - 18);
    ctx.textAlign = "left";
    ctx.lineWidth = 1;
  }

  // ── PLAYER ──
  const pImg = player.facing === "side" ? imgs.vamshik_side : imgs.vamshik_front;
  ctx.save();
  if(player.flipX) {
    ctx.translate(player.x + player.w, player.y);
    ctx.scale(-1, 1);
    ctx.drawImage(pImg, 0, 0, player.w, player.h);
  } else {
    ctx.drawImage(pImg, player.x, player.y, player.w, player.h);
  }
  ctx.restore();

  // Player nametag
  ctx.font = "bold 11px Courier New";
  ctx.fillStyle = "#c084fc";
  ctx.textAlign = "center";
  ctx.fillText("VAMSHIK", player.x + player.w/2, player.y - 8);
  ctx.textAlign = "left";

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ── UPDATE ──
function update() {
  if(!gameActive || dialogueActive) return;

  // Player movement
  let dx = 0, dy = 0;
  if(keys["ArrowUp"]||keys["w"]||keys["W"]) dy = -player.speed;
  if(keys["ArrowDown"]||keys["s"]||keys["S"]) dy = player.speed;
  if(keys["ArrowLeft"]||keys["a"]||keys["A"]) { dx = -player.speed; player.facing="side"; player.flipX=true; }
  if(keys["ArrowRight"]||keys["d"]||keys["D"]) { dx = player.speed; player.facing="side"; player.flipX=false; }
  if(dy!==0 && dx===0) player.facing="front";
  player.moving = dx!==0||dy!==0;

  player.x = Math.max(0, Math.min(WORLD_W - player.w, player.x + dx));
  player.y = Math.max(0, Math.min(WORLD_H - player.h, player.y + dy));

  // Camera follow
  cam.x = Math.max(0, Math.min(WORLD_W - canvas.width, player.x + player.w/2 - canvas.width/2));
  cam.y = Math.max(0, Math.min(WORLD_H - canvas.height, player.y + player.h/2 - canvas.height/2));

  // Check NPC proximity
  if(gamePhase === "explore") {
    npcs.forEach((npc, i) => {
      if(npc.solved) return;
      const dist = Math.hypot(player.x - npc.x, player.y - npc.y);
      if(dist < 120) {
        npc.solved = true;
        gamePhase = "npc";
        dlgStep = i + 1; // Script steps 1,2,3 are the NPCs
        showDialogue(dlgStep);
      }
    });
  }

  // Check temple proximity (after all NPCs solved)
  if(gamePhase === "explore" && npcs.every(n => n.solved)) {
    const distTemple = Math.hypot(player.x - (temple.x+120), player.y - temple.y);
    if(distTemple < 150) {
      startEI();
    }
  }

  // Diya update
  updateDiya();
}

// ── LOOP ──
function loop() {
  update();
  // Clear
  ctx.fillStyle = "#050010";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  if(gameActive) drawWorld();
  requestAnimationFrame(loop);
}

// ── BOOT ──
document.getElementById("boot").addEventListener("click", () => {
  if(spritesLoaded < 4) { showToast("Loading sprites...", "info"); return; }
  document.getElementById("boot").classList.add("hide");
  setTimeout(() => {
    document.getElementById("boot").style.display = "none";
    document.getElementById("hud").classList.add("show");
    gameActive = true;
    flashChapter("VAMSHIK\'S MIND", "EMOTIONAL INTELLIGENCE", "navigate the chaos. reach the temple.", () => {
      showToast("🧠 Walk to the glowing NPCs to begin. Watch out for Diya!", "info");
      // Activate diya after 8 seconds
      setTimeout(() => {
        diya.active = true;
        showToast("⚠️ DIYA IS COMING — she has a deadline for you!", "bad");
      }, 8000);
    });
  }, 1200);
});

loadSprites(() => { console.log("sprites loaded"); });
loop();
